# .github/workflows/deploy.yml
# CI/CD Pipeline for Saarthi-AI Backend
# Triggers: push to main branch
# Steps: lint → test → build Docker → deploy to Railway

name: Deploy Saarthi-AI Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/saarthi-ai-backend

jobs:

  # ── Job 1: Lint + Syntax Check ───────────────────────────────────────────────
  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install ruff pyflakes

      - name: Run ruff linter
        run: ruff check . --ignore E501,W503

      - name: Syntax check all Python files
        run: |
          for f in $(find . -name "*.py" -not -path "./.venv/*"); do
            python -c "
import ast, sys
try:
    ast.parse(open('$f').read())
except SyntaxError as e:
    print(f'SYNTAX ERROR in $f line {e.lineno}: {e.msg}')
    sys.exit(1)
"
          done
          echo "All Python files passed syntax check."


  # ── Job 2: Tests ─────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run tests
        env:
          # Use dummy values for CI — tests use mocks
          FIREBASE_SERVICE_ACCOUNT_PATH: "tests/mock_service_account.json"
          JWT_SECRET: "ci_test_secret_do_not_use_in_production"
          RAZORPAY_KEY_ID: "rzp_test_dummy"
          RAZORPAY_KEY_SECRET: "dummy_secret"
          RAZORPAY_WEBHOOK_SECRET: "dummy_webhook_secret"
          META_ACCESS_TOKEN: "dummy_meta_token"
          GEMINI_API_KEY: "dummy_gemini_key"
          CRON_SECRET: "dummy_cron_secret"
          FCM_SERVER_KEY: "dummy_fcm_key"
        run: |
          # Run tests if they exist, otherwise skip gracefully
          if [ -d "tests" ]; then
            pytest tests/ -v --tb=short
          else
            echo "No tests directory found — skipping. (Add tests/ to enable)"
          fi


  # ── Job 3: Build & Push Docker Image ─────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64


  # ── Job 4: Deploy to Railway ──────────────────────────────────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: ${{ steps.deploy.outputs.deployment_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        id: deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service saarthi-ai-api --detach
          echo "deployment_url=https://saarthi-ai-api.railway.app" >> $GITHUB_OUTPUT

      - name: Verify deployment health
        run: |
          echo "Waiting 30s for service to start..."
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://saarthi-ai-api.railway.app/health)
          if [ "$STATUS" = "200" ]; then
            echo "✅ Health check passed (HTTP $STATUS)"
          else
            echo "❌ Health check failed (HTTP $STATUS)"
            exit 1
          fi

      - name: Notify deployment success
        if: success()
        run: |
          echo "🚀 Saarthi-AI deployed successfully!"
          echo "URL: https://saarthi-ai-api.railway.app"
          echo "Commit: ${{ github.sha }}"
          echo "Deployed by: ${{ github.actor }}"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Deployment FAILED for commit ${{ github.sha }}"
          echo "Check logs: https://railway.app/dashboard"
